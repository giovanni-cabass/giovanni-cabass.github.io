<header class="site-header">
  <nav class="site-nav">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <ul class="nav-links">
      <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a></li>
      <li><a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} class="active"{% endif %}>About</a></li>
      <li><a href="{{ '/research/' | relative_url }}"{% if page.url == '/research/' %} class="active"{% endif %}>Research</a></li>
      <li><a href="{{ '/projects/' | relative_url }}"{% if page.url == '/projects/' %} class="active"{% endif %}>Projects</a></li>
      <li><a href="{{ '/writing/' | relative_url }}"{% if page.url contains '/writing' %} class="active"{% endif %}>Writing</a></li>
      <li><a href="{{ '/contact/' | relative_url }}"{% if page.url == '/contact/' %} class="active"{% endif %}>Contact</a></li>
      <li>
        <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark/light mode">
          <span class="icon-sun">☀</span>
          <span class="icon-moon">☾</span>
        </button>
      </li>
    </ul>
  </nav>
</header>
